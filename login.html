<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phoenix Snooker Club | Connexion</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f8f4ef;
        color: #1f1f24;
      }

      .card {
        width: min(560px, 100%);
        padding: 28px;
        border-radius: 24px;
        background: #fff;
        box-shadow: 0 18px 48px rgba(15, 14, 18, 0.12);
        border: 1px solid rgba(33, 37, 41, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      p {
        line-height: 1.7;
        color: #5b616c;
      }

      a {
        color: #dc3545;
        font-weight: 700;
        text-decoration: none;
      }

      code {
        font-family: Consolas, "Courier New", monospace;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>La nouvelle connexion passe par Angular.</h1>
      <p>
        Cette ancienne page n'est plus utilisee directement. Lance l'application
        avec <code>start-app.cmd</code> ou <code>cmd /c npm --prefix server run start:full</code>,
        puis ouvre :
      </p>
      <p>
        <a href="http://localhost:3001/login" target="_blank" rel="noopener">
          http://localhost:3001/login
        </a>
      </p>
    </main>
  </body>
</html>
