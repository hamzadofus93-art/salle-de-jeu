<div class="login-shell">
  <div class="container py-4 py-lg-5">
    <section class="login-card">
      <div class="brand-block">
        <div class="brand-logo-frame" aria-label="Phoenix Snooker Club">
          <img
            class="brand-logo"
            src="branding/phoenix-logo-primary.png"
            alt="Phoenix Snooker Club"
          />
        </div>

        <p class="login-kicker mb-2">Phoenix Snooker Club</p>
        <h1 class="mb-2">Connexion equipe</h1>
        <p class="login-copy mb-0">
          Entre simplement tes identifiants pour ouvrir la gestion de salle.
        </p>
      </div>

      <div
        *ngIf="errorMessage"
        class="alert alert-danger"
        role="alert"
        aria-live="polite"
      >
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="submit()" #loginForm="ngForm" class="login-form">
        <div>
          <label for="username" class="form-label">Identifiant</label>
          <input
            id="username"
            name="username"
            class="form-control form-control-lg"
            type="text"
            autocomplete="username"
            placeholder="Identifiant"
            [(ngModel)]="credentials.username"
            required
          />
        </div>

        <div>
          <label for="password" class="form-label">Mot de passe</label>
          <div class="input-group input-group-lg">
            <input
              id="password"
              name="password"
              class="form-control"
              [type]="isPasswordVisible ? 'text' : 'password'"
              autocomplete="current-password"
              placeholder="Mot de passe"
              [(ngModel)]="credentials.password"
              required
            />
            <button
              class="btn btn-outline-dark password-toggle"
              type="button"
              (click)="togglePasswordVisibility()"
              [attr.aria-pressed]="isPasswordVisible"
            >
              {{ isPasswordVisible ? 'Masquer' : 'Afficher' }}
            </button>
          </div>
        </div>

        <button
          class="btn btn-danger btn-lg w-100"
          type="submit"
          [disabled]="isSubmitting || loginForm.invalid"
        >
          <span
            *ngIf="isSubmitting"
            class="spinner-border spinner-border-sm me-2"
          ></span>
          Se connecter
        </button>
      </form>
    </section>
  </div>
</div>
